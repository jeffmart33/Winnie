<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store Locator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Find A Healthy Spot</p>
          <h1>Store Locator</h1>
        </div>
        <button id="mobileToggle" class="mobile-toggle">Toggle List/Map</button>
      </header>

      <section class="filters">
        <input id="q" type="text" placeholder="Search by store name" />
        <input id="city" type="text" placeholder="City" />
        <input id="postal" type="text" placeholder="Postal code" />
        <select id="category">
          <option value="all">All Categories</option>
          <option value="Store">Store</option>
          <option value="Restaurant">Restaurant</option>
          <option value="Pharmacy">Pharmacy</option>
          <option value="Pop-Up">Pop-Up</option>
          <option value="Apparel">Apparel</option>
        </select>
        <select id="radius">
          <option value="">Any Radius</option>
          <option value="2">2 km</option>
          <option value="5">5 km</option>
          <option value="10">10 km</option>
        </select>
        <button id="useMyLocation">Use My Location</button>
        <button id="applyFilters">Apply</button>
      </section>

      <main class="layout" id="layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-head">
            <h2>Locations</h2>
            <span id="resultCount">0 results</span>
          </div>
          <ul id="locationList" class="location-list"></ul>
        </aside>
        <section id="map" class="map"></section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
